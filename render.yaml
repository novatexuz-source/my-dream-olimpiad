services:
  - type: web
    name: my-dream-olimpiad-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
